# Single source of truth for a run. Everything swappable lives here.
# Secrets are NEVER in this file -- they come from env vars (GITHUB_TOKEN, HF_TOKEN).

seed: 0
run_id: null            # null -> bootstrap sets a UTC timestamp

# ---- swap the model here (key into MODEL_REGISTRY in src/registry.py) --------
model:
  name: llava-1.5-7b
  dtype: float16
  # prompt used to elicit a single forward pass; last-token hidden state + logits
  prompt: "USER: <image>\nWhat is the main object in this image? Answer with a single word. ASSISTANT:"

# ---- swap detectors here (keys into DETECTOR_REGISTRY) -----------------------
detector:
  methods: [msp, energy, mahalanobis]   # add "knn", "vim", ... later
  knn_k: 50

# ---- data (real ID is gated ImageNet-1k via HF_TOKEN) -----------------------
data:
  reuse: false            # true -> pull the prebuilt snapshot from HF (hf.dataset_repo)
                          #         instead of re-running prepare_data + generate_fakes
  id:
    source: imagenet-1k     # HuggingFace, gated -> needs HF_TOKEN
    split: train            # train has ~1300/class (needed for max_per_class=300)
    classes:                # 15 picked synsets
      - {name: tabby_cat,          wnid: n02123045}
      - {name: labrador_retriever, wnid: n02099712}
      - {name: goldfish,           wnid: n01443537}
      - {name: bald_eagle,         wnid: n01614925}
      - {name: african_elephant,   wnid: n02504458}
      - {name: zebra,              wnid: n02391049}
      - {name: tiger,              wnid: n02129604}
      - {name: brown_bear,         wnid: n02132136}
      - {name: ostrich,            wnid: n01518878}
      - {name: sports_car,         wnid: n04285008}
      - {name: school_bus,         wnid: n04146614}
      - {name: airliner,           wnid: n02690373}
      - {name: mountain_bike,      wnid: n03792782}
      - {name: grand_piano,        wnid: n03452741}
      - {name: steam_locomotive,   wnid: n04310018}
    max_per_class: 300
    test_frac: 0.2
  ood_real:
    source: dtd             # Describable Textures (HF mirror, no login)
    size: 3000
  fake:
    # Contaminant pool ONLY (injected into id_train; NEVER into test sets).
    # All fakes are AI-generated -- incl. WHOOPS! (Midjourney/DALL-E/SD), so
    # real-vs-fake test comparisons are confounded and deliberately not run.
    sdxl_aligned:  {enabled: true,  n_per_class: 240}  # category-aligned contaminants
    whoops:        {enabled: false, limit: 500}        # reserved for future controls
    sdxl_freeform: {enabled: false, n: 500}            # reserved for future controls

# ---- experiment sweep (mixing pipeline) --------------------------------------
# One condition = one ID-training contamination ratio. Test sets (clean real
# id_test + clean real ood_test) are identical across conditions -- guardrail.
# Swept to 100%: >=50% is where robust estimators should break if ever; 100% =
# "train only on impossible {class}s, test on real" -- the near-class test.
# Needs 240 unique fakes/class so 100% isn't a handful of images cycled.
conditions:
  id_fake_ratios:  [0.0, 0.10, 0.25, 0.50, 0.75, 1.0]
  ood_test_size: 3000

# ---- dataset snapshot on HuggingFace (private; images live here, not in git) -
hf:
  dataset_repo: "EricY05/lvlm-ood-fake-data"   # private HF dataset for the images
  private: true
  revision: "6d8de1692087e4b42f476541cb8e2b8015742b25"   # fake_id v2 (240/class, per-class-group templates) + 4500 ID + 3000 OOD

# ---- result upload (code repo, dedicated branch) ----------------------------
upload:
  repo: "https://github.com/ericjtyao05-cmd/LVLM_OOD_Detection.git"
  branch: results
  raw:        [results.json, logs, manifests]   # reproducible originals -> git
  paper_ready: true                             # LaTeX tables + AUROC/FPR95 heatmaps

# ---- lifecycle --------------------------------------------------------------
lifecycle:
  auto_destroy: watcher    # "watcher" (laptop-side, option A) or "self" (key on box)
  done_marker: results/DONE  # pushed to the results branch when finished
